# FineTunedResNet-50 hyperparameters (Review 2)
model: pretrained
backbone: resnet50
n_classes: 14
dropout: 0.4
freeze_strategy: layer3_layer4_unfrozen  # layer3, layer4, fc are trainable

training:
  epochs: 8
  batch_size: 32
  learning_rate: 0.0001
  weight_decay: 0.00001
  optimizer: AdamW
  scheduler: cosine
  patience: 3
  subset_frac: 0.10
  augmentation: strong
