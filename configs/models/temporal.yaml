# CNN-RNN Hybrid hyperparameters (Review 2)
model: temporal
backbone: resnet50
rnn_type: LSTM          # options: LSTM, GRU, RNN
attention: bahdanau     # options: bahdanau, self, multihead
hidden_dim: 256
embed_dim: 128
num_layers: 2
bidirectional: true
freeze_backbone: true
dropout: 0.3
n_classes: 14
max_seq_len: 5

training:
  epochs: 8
  batch_size: 32
  learning_rate: 0.0001
  weight_decay: 0.00001
  optimizer: AdamW
  patience: 3
  subset_frac: 0.10
